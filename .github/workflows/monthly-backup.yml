name: Monthly Database Backup

on:
  schedule:
    - cron: '0 2 1 * *'   # 2:00 AM UTC on 1st of each month
  workflow_dispatch:       # manual trigger for immediate runs

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump and compress database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          set -o pipefail
          FILENAME="crew-center-$(date -u +%Y-%m-%d).sql.gz"
          /usr/lib/postgresql/17/bin/pg_dump --dbname="$DATABASE_URL" | gzip > "$FILENAME"
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          FILE_BYTES=$(stat -c%s "$FILENAME")
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "SIZE=$SIZE"         >> $GITHUB_ENV
          if [ "$FILE_BYTES" -gt $((8 * 1024 * 1024)) ]; then
            echo "::error::Backup is ${SIZE} — exceeds Discord 8 MB limit. Upload skipped."
            exit 1
          fi

      - name: Send to Discord
        env:
          DISCORD_BACKUP_WEBHOOK: ${{ secrets.DISCORD_BACKUP_WEBHOOK }}
        run: |
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$DISCORD_BACKUP_WEBHOOK" \
            -F "payload_json={\"content\":\"📦 **Crew Center — PostgreSQL Backup** \`${FILENAME}\` · ${SIZE}\"}" \
            -F "file=@${FILENAME}")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Discord webhook returned HTTP $HTTP"
            exit 1
          fi

      - name: Notify failure
        if: failure()
        env:
          DISCORD_BACKUP_WEBHOOK: ${{ secrets.DISCORD_BACKUP_WEBHOOK }}
        run: |
          curl -sS -X POST "$DISCORD_BACKUP_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"⚠️ **Crew Center backup FAILED** on $(date -u +%Y-%m-%d) — check Actions logs for details.\"}"
